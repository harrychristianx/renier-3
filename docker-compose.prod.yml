services:
  api:
    container_name: renier-3-api
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_PORT: 4000
      DATABASE_URL: file:/data/dev.db
      FRONTEND_ORIGIN: https://renier-3.harrychristian.com
      ADMIN_ORIGIN: https://admin-renier-3.harrychristian.com
    volumes:
      - renier-3-db-data:/data
    expose:
      - "4000"

  frontend:
    container_name: renier-3-frontend
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ""
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "127.0.0.1:8091:80"

  admin:
    container_name: renier-3-admin
    build:
      context: .
      dockerfile: Dockerfile.admin
      args:
        VITE_API_URL: ""
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "127.0.0.1:8092:80"

volumes:
  renier-3-db-data:
